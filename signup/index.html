<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ERC の参加フォームに入力し、送信するとチームへ届きます。">
  <meta name="theme-color" content="#07090d">
  <title>EVERWILD · 参加登録</title>
  <link rel="canonical" href="https://www.everwild-runningclub.com/signup/">
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/images/logo/favicon.png">
  <link rel="apple-touch-icon" href="../assets/images/logo/favicon.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="EVERWILD">
  <meta property="og:title" content="EVERWILD · 参加登録">
  <meta property="og:description" content="ERC の参加フォームに入力し、送信するとチームへ届きます。">
  <meta property="og:url" content="https://www.everwild-runningclub.com/signup/">
  <meta property="og:image" content="https://www.everwild-runningclub.com/assets/images/logo/everwild-horizontal-white.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="EVERWILD · 参加登録">
  <meta name="twitter:description" content="ERC の参加フォームに入力し、送信するとチームへ届きます。">
  <meta name="twitter:image" content="https://www.everwild-runningclub.com/assets/images/logo/everwild-horizontal-white.png">
  <link rel="stylesheet" href="../assets/css/shared/site-core.css">
  <link rel="stylesheet" href="../assets/css/pages/signup.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></div>
    <div class="shell">
      <div class="shell-nav-row">
        <a class="brand" href="../index.html" aria-label="Everwild Running Club">
          <div class="brand-mark">
            <img class="brand-mark-default" src="../assets/images/logo/Roadrunner-white.png" alt="ERC logo">
            <img class="brand-mark-hover" src="../assets/images/logo/Roadrunner-pink.png" alt="" aria-hidden="true">
          </div>
          <div class="brand-copy">
            <strong>ERC</strong>
            <span data-i18n="brandLine">Everwild Running Club</span>
          </div>
        </a>

        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-menu" aria-label="メニューを開く">
          <span class="nav-toggle-box" aria-hidden="true">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </span>
        </button>
      </div>

      <div class="header-actions" id="site-menu">
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="../index.html#manifesto" data-i18n="navManifesto">关于我们</a>
          <a href="../index.html#schedule" data-i18n="navSchedule">常规活动</a>
          <a href="../index.html#routes" data-i18n="navRoutes">东京跑线</a>
          <a href="../index.html#pacers" data-i18n="navPacers">配速团队</a>
          <a class="nav-social" href="../index.html#join" data-i18n="navSocial">联系我们</a>
          <a href="../index.html#shop" data-i18n="navBrands">官方商店</a>
          <a class="nav-signup" href="#signup" data-i18n="navSignup">立即报名</a>
        </nav>

        <div class="lang-toggle" aria-label="Language switcher">
          <button type="button" class="is-active" data-lang-toggle="ja" aria-pressed="true">JA</button>
          <button type="button" data-lang-toggle="en" aria-pressed="false">EN</button>
          <button type="button" data-lang-toggle="zh" aria-pressed="false">CN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="hero" id="top">
    <div class="hero-grid">
      <section class="form-panel" id="signup">
        <div class="form-head">
          <h1 data-i18n="formTitle">加入ERC</h1>
          <p data-i18n="formBody">填写完成后点击提交，报名信息将发送至 ERC 团队。</p>
        </div>

        <form id="signup-form">
          <input type="text" name="_gotcha" class="signup-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="field-grid">
            <div class="field">
              <label class="is-required" for="name" data-i18n="labelName">称呼</label>
              <input id="name" name="name" type="text" required>
            </div>

            <div class="field">
              <label class="is-required" for="contact" data-i18n="labelContact">微信号/邮箱</label>
              <input id="contact" name="contact" type="text" required>
            </div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="language" data-i18n="labelLanguage">希望言語</label>
              <select id="language" name="language">
                <option value="ja" data-i18n="optionJa">日本語</option>
                <option value="en" data-i18n="optionEn">English</option>
                <option value="zh" data-i18n="optionZh">中文</option>
                <option value="bi" data-i18n="optionBi">Bilingual</option>
              </select>
            </div>

            <div class="field">
              <label for="experience" data-i18n="labelExperience">Running Experience</label>
              <select id="experience" name="experience">
                <option value="first" data-i18n="expFirst">第一次参加跑团</option>
                <option value="steady" data-i18n="expSteady">正在稳定跑步</option>
                <option value="training" data-i18n="expTraining">有训练目标</option>
                <option value="race" data-i18n="expRace">正在备赛</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="pace" data-i18n="labelPace">Comfortable Pace</label>
            <input id="pace" name="pace" type="text" placeholder="e.g. 5:30/km">
            <span class="field-hint" data-i18n="paceHint">如果暂时不确定，可以写“还不确定”或留空。</span>
          </div>

          <div class="choice-group">
            <div class="choice-title is-required" data-i18n="labelSessions">Interested Sessions</div>
            <div class="choice-grid">
              <label class="choice"><input type="checkbox" name="sessions" value="tue_interval"><span data-i18n="sessionTue">周二代代木间歇跑</span></label>
              <label class="choice"><input type="checkbox" name="sessions" value="thu_threshold"><span data-i18n="sessionThu">周四皇居乳酸阈值跑</span></label>
              <label class="choice"><input type="checkbox" name="sessions" value="fri_fun"><span data-i18n="sessionFri">周五皇居欢乐跑</span></label>
              <label class="choice"><input type="checkbox" name="sessions" value="sat_lsd"><span data-i18n="sessionSatLsd">周六东京周边 LSD</span></label>
              <label class="choice"><input type="checkbox" name="sessions" value="sat_newcomer"><span data-i18n="sessionSatNew">周六皇居新人募集跑</span></label>
            </div>
          </div>

          <div class="choice-group">
            <div class="choice-title" data-i18n="labelGoals">Goals</div>
            <div class="choice-grid">
              <label class="choice"><input type="checkbox" name="goals" value="training"><span data-i18n="goalTraining">训练</span></label>
              <label class="choice"><input type="checkbox" name="goals" value="health"><span data-i18n="goalHealth">健康</span></label>
              <label class="choice"><input type="checkbox" name="goals" value="race"><span data-i18n="goalRace">备战</span></label>
              <label class="choice"><input type="checkbox" name="goals" value="social"><span data-i18n="goalSocial">社交</span></label>
            </div>
          </div>

          <div class="field">
            <label for="notes" data-i18n="labelNotes">Notes</label>
            <textarea id="notes" name="notes"></textarea>
            <span class="field-hint" data-i18n="notesHint">可以填写伤病情况、想先参加哪次活动、是否第一次在东京参加跑团等。</span>
          </div>

          <label class="consent">
            <input id="consent" name="consent" type="checkbox" required>
            <span class="is-required" data-i18n="consentText">我理解提交后信息将发送至 ERC，最终能否参加以 ERC 的回复与实际活动安排为准。</span>
          </label>

          <button class="button button-primary" type="submit" data-i18n="submitLabel">Prepare Signup Message</button>
        </form>

        <section id="status" class="status" aria-live="polite">
          <strong id="status-title" data-i18n="statusTitle">送信結果</strong>
          <p id="status-copy" data-i18n="statusBody"></p>
          <textarea id="output" class="output-box" readonly aria-label="Signup summary"></textarea>
          <div class="helper-row">
            <a class="button button-primary" href="../index.html" data-i18n="statusHome">返回 ERC 首页</a>
          </div>
        </section>
      </section>
    </div>
  </main>
  <script src="../assets/js/shared/site-i18n.js"></script>
  <script src="../assets/js/shared/site-nav.js"></script>
  <script src="../assets/js/pages/signup.js"></script>
</body>
</html>
